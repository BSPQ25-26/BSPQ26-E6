<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Football Manager - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pitch-bg {
            background-color: #0f172a; /* Slate 900 */
            background-image: radial-gradient(circle at top right, #064e3b, transparent 40%),
            radial-gradient(circle at bottom left, #064e3b, transparent 40%);
        }
    </style>
</head>
<body class="pitch-bg min-h-screen flex items-center justify-center p-4 font-sans text-slate-100">

<div class="max-w-md w-full bg-slate-800/80 backdrop-blur-md rounded-2xl shadow-2xl overflow-hidden border border-slate-700">
    <div class="p-8">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-500/20 text-emerald-400 mb-4 shadow-inner">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 00-1-1H4a1 1 0 01-1-1V4a1 1 0 011-1h3a1 1 0 001-1v-1z"></path></svg>
            </div>
            <h2 class="text-3xl font-extrabold text-white tracking-tight uppercase">Football Manager</h2>
            <p class="text-sm text-slate-400 mt-2">Enter your credentials to access the database.</p>
        </div>

        <div id="message" class="hidden mb-4 p-3 rounded-lg text-sm text-center font-medium"></div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-300 mb-1">Username</label>
                <input type="text" id="username" name="username" required
                       class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-600 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-600 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all">
            </div>

            <button type="submit" class="w-full py-3 px-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-lg shadow-lg shadow-emerald-600/30 transition-all transform hover:-translate-y-0.5 uppercase tracking-wide">
                Log In
            </button>
        </form>
    </div>
    <div class="px-8 py-4 bg-slate-900/50 border-t border-slate-700 text-center">
        <p class="text-sm text-slate-400">
            New to the platform?
            <a href="/register" class="font-medium text-emerald-400 hover:text-emerald-300 transition-colors">Register here</a>
        </p>
    </div>
</div>

<script>
    const loginForm = document.getElementById('loginForm');
    const message = document.getElementById('message');

    function showMessage(text, isError) {
        message.textContent = text;
        message.classList.remove('hidden');
        // Adaptando colores al tema oscuro
        message.className = isError
            ? 'mb-4 p-3 bg-red-500/10 border border-red-500/50 text-red-400 rounded-lg text-sm text-center font-medium'
            : 'mb-4 p-3 bg-emerald-500/10 border border-emerald-500/50 text-emerald-400 rounded-lg text-sm text-center font-medium';
    }

    loginForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        const formData = new FormData(loginForm);
        const payload = {
            username: formData.get('username'),
            password: formData.get('password')
        };

        try {
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            if (!response.ok) {
                showMessage(data.message || 'Login failed', true);
                return;
            }

            showMessage('Login successful. Redirecting...', false);
            window.location.href = '/teams';
        } catch (error) {
            showMessage('Network error. Please try again.', true);
        }
    });
</script>
</body>
</html>
