<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Football Manager - Add Team</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-10">
    <div class="max-w-lg mx-auto bg-white p-8 rounded-lg shadow">
        <h2 class="text-2xl font-bold mb-6">Add New Team</h2>

        <form th:action="@{/api/teams}" th:object="${teamRequest}" method="POST" class="space-y-4">
            
            <div>
                <label class="block text-sm font-medium">Team Name</label>
                <input type="text" th:field="*{name}" class="w-full border p-2 rounded" required placeholder="e.g., Athletic Club">
            </div>

            <div>
                <label class="block text-sm font-medium">City</label>
                <input type="text" th:field="*{city}" class="w-full border p-2 rounded" required placeholder="e.g., Bilbao">
            </div>

            <div>
                <label class="block text-sm font-medium">Stadium</label>
                <input type="text" th:field="*{stadium}" class="w-full border p-2 rounded" placeholder="e.g., San Mamés">
            </div>

            <button type="submit" class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">
                Add Team
            </button>
        </form>
    </div>
</body>
</html>
