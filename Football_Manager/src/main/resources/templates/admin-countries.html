<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <title th:text="#{adminCountries.title}">Manage Countries - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pitch-bg { background-color: #f8fafc; }
    </style>
</head>
<body class="pitch-bg min-h-screen font-sans text-slate-800 pb-10">

<nav class="bg-slate-900 border-b-2 border-emerald-600 shadow-md mb-10">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center gap-3">
                <span class="text-xl font-black text-white uppercase tracking-wider"><span th:text="#{brand.control}">Control</span><span class="text-emerald-500" th:text="#{brand.center}">Center</span></span>
            </div>
            <div class="flex items-center gap-3">
                <select id="langSelect"
                        class="px-4 py-[0.55rem] bg-slate-800 text-slate-300 text-sm font-medium rounded-md border border-slate-700"
                        onchange="window.location.href = window.location.pathname + '?lang=' + this.value;">
                    <option value="es" th:selected="${#locale.language == 'es'}" th:text="#{global.lang.es}">Espanol</option>
                    <option value="en" th:selected="${#locale.language == 'en'}" th:text="#{global.lang.en}">English</option>
                </select>
                <a href="/admin" class="px-4 py-2 bg-slate-800 text-slate-300 text-sm font-medium rounded-md hover:bg-slate-700 hover:text-white transition-colors border border-slate-700" th:text="#{adminCountries.backToPanel}">
                    Back to Panel
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="mb-8">
        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight uppercase" th:text="#{adminCountries.heading}">Manage Countries</h1>
        <p class="text-slate-500 mt-1 font-medium" th:text="#{adminCountries.subtitle}">Add new countries or remove existing ones from the database.</p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-50 rounded-bl-full -z-10"></div>

        <h2 class="text-lg font-bold text-slate-800 mb-4" th:text="#{adminCountries.addHeading}">Add New Country</h2>

        <form th:action="@{/admin/countries}" th:object="${countryRequest}" method="POST" class="flex flex-col sm:flex-row gap-3">

            <div class="flex-grow">
                <input type="text" th:field="*{name}" th:placeholder="#{adminCountries.input.placeholder}"
                       class="w-full pl-4 pr-3 py-3 border border-slate-300 rounded-lg bg-slate-50 placeholder-slate-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all font-medium" required>
            </div>

            <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-lg font-bold shadow-md shadow-emerald-500/30 transition-all uppercase tracking-wide whitespace-nowrap" th:text="#{adminCountries.addButton}">
                Add Country
            </button>
        </form>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="px-6 py-4 bg-slate-50 border-b border-slate-200">
            <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider" th:text="#{adminCountries.listHeading}">Registered Countries</h2>
        </div>

        <div class="divide-y divide-slate-100">
            <div th:each="country : ${countries}" class="flex items-center justify-between p-4 hover:bg-slate-50 transition-colors">

                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center font-bold text-xs">
                        <span th:text="${#strings.substring(country.name, 0, 1)}">C</span>
                    </div>
                    <span class="font-bold text-slate-700 text-lg" th:text="${country.name}">Country Name</span>
                </div>

                <form th:action="@{/admin/countries/delete/{id}(id=${country.id})}" method="POST" class="m-0"
                      th:attr="onsubmit=|return confirm('${#messages.msg('adminCountries.deleteConfirm')}');|">
                    <button type="submit" class="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded text-sm font-semibold transition-colors border border-red-100" th:text="#{adminCountries.delete}">
                        Delete
                    </button>
                </form>
            </div>

            <div th:if="${#lists.isEmpty(countries)}" class="p-8 text-center text-slate-500" th:text="#{adminCountries.empty}">
                No countries added yet. Start by adding one above.
            </div>
        </div>
    </div>
</div>
</body>
</html>
