<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Football Manager - Match Schedule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pitch-bg {
            background-color: #f8fafc;
            background-image: url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23e2e8f0" fill-opacity="0.4"%3E%3Cpath d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');
        }
    </style>
</head>
<body class="pitch-bg min-h-screen font-sans text-slate-800">

<nav class="bg-slate-900 border-b-2 border-emerald-600 shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>
                <span class="text-xl font-black text-white uppercase tracking-wider">Football<span class="text-emerald-500">Manager</span></span>
            </div>
            <div class="flex gap-3">
                <a th:if="${isAdmin}" href="/admin" class="px-4 py-2 bg-slate-800 text-slate-300 text-sm font-medium rounded-md hover:bg-slate-700 hover:text-white transition-colors border border-slate-700">
                    Admin Panel
                </a>
                <a href="/teams" class="px-4 py-2 bg-slate-800 text-slate-300 text-sm font-medium rounded-md hover:bg-slate-700 hover:text-white transition-colors border border-slate-700">
                    Teams
                </a>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight uppercase">Match <span class="text-emerald-600">Schedule</span></h1>
            <p class="text-slate-500 mt-1 font-medium">Track all upcoming fixtures and final results.</p>
        </div>
        <a href="/matches/schedule" class="px-6 py-3 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-200 uppercase text-sm tracking-widest">
            Schedule New Match
        </a>
    </div>

    <div th:if="${#lists.isEmpty(matches)}" class="bg-white p-12 rounded-2xl shadow-sm border border-slate-200 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-100 text-slate-400 mb-4">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        </div>
        <h3 class="text-lg font-bold text-slate-900">No matches scheduled</h3>
        <p class="text-slate-500 mt-1">Check back later or schedule a new game.</p>
    </div>

    <div th:unless="${#lists.isEmpty(matches)}" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <table class="w-full text-left">
            <thead>
                <tr class="bg-slate-50 border-b border-slate-200">
                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Date & Time</th>
                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Home</th>
                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">Score</th>
                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Away</th>
                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Competition</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
                <tr th:each="match : ${matches}" class="hover:bg-emerald-50/30 transition-colors group">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm font-bold text-slate-900" th:text="${#temporals.format(match.datetime, 'dd MMM yyyy')}"></div>
                        <div class="text-xs text-slate-500" th:text="${#temporals.format(match.datetime, 'HH:mm')}"></div>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <span class="text-sm font-black text-slate-700 uppercase" th:text="${match.leftTeam.name}">Home Team</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <div class="inline-flex items-center px-3 py-1 rounded-lg bg-slate-900 text-emerald-400 font-mono font-bold shadow-inner">
                            <span th:text="${match.leftScore}">0</span>
                            <span class="mx-2 opacity-50">-</span>
                            <span th:text="${match.rightScore}">0</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-left">
                        <span class="text-sm font-black text-slate-700 uppercase" th:text="${match.rightTeam.name}">Away Team</span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded" th:text="${match.competition.name}">Competition</span>
                            <span th:if="${match.finished}" class="text-[10px] uppercase font-black text-slate-400">FT</span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
