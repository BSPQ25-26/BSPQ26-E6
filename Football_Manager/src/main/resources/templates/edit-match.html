<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Football Manager - Edit Match</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen py-10 px-4">
<div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md p-8">
    <h1 class="text-2xl font-bold text-slate-900 mb-2">Edit Match</h1>
    <p class="text-slate-500 mb-6">Update match details and submit to apply changes.</p>

    <div id="message" class="hidden mb-4 rounded-md px-4 py-3 text-sm font-medium"></div>

    <form id="editMatchForm" th:object="${matchRequest}" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-slate-700">Home Team ID</label>
            <input type="number" th:field="*{homeTeamId}" required class="mt-1 w-full rounded border border-slate-300 px-3 py-2">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Away Team ID</label>
            <input type="number" th:field="*{awayTeamId}" required class="mt-1 w-full rounded border border-slate-300 px-3 py-2">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Kickoff Time</label>
            <input type="datetime-local" th:field="*{kickoffTime}" required class="mt-1 w-full rounded border border-slate-300 px-3 py-2">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Venue</label>
            <input type="text" th:field="*{venue}" required class="mt-1 w-full rounded border border-slate-300 px-3 py-2">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Status</label>
            <select id="status" th:field="*{status}" class="mt-1 w-full rounded border border-slate-300 px-3 py-2">
                <option th:each="st : ${T(com.example.football_manager.dto.MatchRequestDTO.MatchStatus).values()}"
                        th:value="${st}" th:text="${st}"></option>
            </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-slate-700">Home Score</label>
                <input type="number" min="0" th:field="*{homeScore}" class="mt-1 w-full rounded border border-slate-300 px-3 py-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Away Score</label>
                <input type="number" min="0" th:field="*{awayScore}" class="mt-1 w-full rounded border border-slate-300 px-3 py-2">
            </div>
        </div>

        <div class="pt-4 flex gap-3">
            <button type="submit" class="bg-blue-600 text-white px-5 py-2 rounded hover:bg-blue-700">Save Match</button>
            <a href="/matches/results" class="bg-slate-200 text-slate-800 px-5 py-2 rounded hover:bg-slate-300">Cancel</a>
        </div>
    </form>
</div>

<script th:inline="javascript">
    const form = document.getElementById('editMatchForm');
    const messageBox = document.getElementById('message');
    const matchId = /*[[${matchId}]]*/ 0;

    function showMessage(text, isError) {
        messageBox.textContent = text;
        messageBox.classList.remove('hidden');
        messageBox.className = isError
            ? 'mb-4 rounded-md px-4 py-3 text-sm font-medium bg-red-100 text-red-700'
            : 'mb-4 rounded-md px-4 py-3 text-sm font-medium bg-emerald-100 text-emerald-700';
    }

    form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const payload = {
            homeTeamId: form.homeTeamId.value ? Number(form.homeTeamId.value) : null,
            awayTeamId: form.awayTeamId.value ? Number(form.awayTeamId.value) : null,
            kickoffTime: form.kickoffTime.value || null,
            venue: form.venue.value,
            status: form.status.value || null,
            homeScore: form.homeScore.value ? Number(form.homeScore.value) : null,
            awayScore: form.awayScore.value ? Number(form.awayScore.value) : null
        };

        try {
            const response = await fetch(`/api/matches/${matchId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const responseText = await response.text();

            if (!response.ok) {
                showMessage(responseText || 'Unable to update match.', true);
                return;
            }

            showMessage(responseText || 'Match updated successfully.', false);
        } catch (error) {
            showMessage('Request failed. Please try again.', true);
        }
    });
</script>
</body>
</html>
