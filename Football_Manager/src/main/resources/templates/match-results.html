<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <title th:text="#{matchResults.title}">Football Manager - Match Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pitch-bg {
            background-color: #f8fafc;
            background-image: url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23e2e8f0" fill-opacity="0.4"%3E%3Cpath d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');
        }
    </style>
</head>
<body class="pitch-bg min-h-screen font-sans text-slate-800">

<nav class="bg-slate-900 border-b-2 border-emerald-600 shadow-md">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>
                <span class="text-xl font-black text-white uppercase tracking-wider" th:text="#{adminPanel.matchResults.title}">Match<span class="text-emerald-500">Results</span></span>
            </div>
            <div class="flex items-center gap-3">
                <select id="langSelect"
                        class="px-4 py-[0.55rem] bg-slate-800 text-slate-300 text-sm font-medium rounded-md border border-slate-700"
                        onchange="window.location.href = window.location.pathname + '?lang=' + this.value;">
                    <option value="es" th:selected="${#locale.language == 'es'}" th:text="#{global.lang.es}">Espanol</option>
                    <option value="en" th:selected="${#locale.language == 'en'}" th:text="#{global.lang.en}">English</option>
                </select>
                <a href="/admin" class="px-4 py-2 bg-slate-800 text-slate-300 text-sm font-medium rounded-md hover:bg-slate-700 hover:text-white transition-colors border border-slate-700" th:text="#{matchResults.navBack}">
                    Back to Admin
                </a>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight uppercase" th:text="#{matchResults.heading}">Final Scores</h1>
        <p class="text-slate-500 mt-1 font-medium" th:text="#{matchResults.subtitle}">Review completed matches and their final scorelines.</p>
    </div>

    <div th:if="${#lists.isEmpty(results)}" class="bg-white p-10 rounded-2xl shadow-sm border border-slate-200 text-center">
        <h2 class="text-xl font-bold text-slate-800" th:text="#{matchResults.empty.title}">No match results available</h2>
        <p class="text-slate-500 mt-2" th:text="#{matchResults.empty.subtitle}">Finished matches will appear here once scores are registered.</p>
    </div>

    <div th:if="${!#lists.isEmpty(results)}" class="space-y-4">
        <div th:each="result : ${results}" class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div class="flex-1 text-center md:text-left">
                    <p class="text-lg font-bold text-slate-900 uppercase" th:text="${result.homeTeamName}">Home Team</p>
                </div>

                <div class="text-center min-w-44">
                    <p class="text-3xl font-extrabold text-emerald-600" th:text="${result.homeScore + ' - ' + result.awayScore}">0 - 0</p>
                    <p class="text-xs text-slate-500 mt-1" th:text="${#temporals.format(result.kickoffTime, 'dd MMM yyyy HH:mm')}">20 Apr 2026 19:00</p>
                </div>

                <div class="flex-1 text-center md:text-right">
                    <p class="text-lg font-bold text-slate-900 uppercase" th:text="${result.awayTeamName}">Away Team</p>
                </div>
            </div>
                <div class="mt-4 flex justify-end gap-3">
                <a th:href="@{/matches/edit/{id}(id=${result.matchId})}"
                   class="w-32 inline-flex justify-center items-center py-2 text-sm font-bold rounded-md bg-blue-600 text-white hover:bg-blue-700 transition-colors" th:text="#{matchResults.edit}">
                    Edit Match
                </a>
                
                <button type="button"
                        th:attr="data-match-id=${result.matchId},data-home-team=${result.homeTeamName},data-away-team=${result.awayTeamName}"
                        onclick="confirmDelete(this)"
                        class="w-32 inline-flex justify-center items-center py-2 text-sm font-bold rounded-md bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 hover:text-red-800 transition-colors" th:text="#{matchResults.delete}">
                    Delete
                </button>
            </div>
        </div>
    </div>
</main>

<div id="confirmModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 transition-opacity">
    <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full mx-4 overflow-hidden transform transition-transform scale-95" id="modalContent">
        <div class="bg-red-500 px-6 py-4">
            <h3 class="text-lg font-bold text-white" th:text="#{matchResults.modal.title}">Confirm Deletion</h3>
        </div>
        <div class="p-6">
            <p id="confirmMessage" class="text-slate-600 mb-8 leading-relaxed"></p>
            <div class="flex gap-3 justify-end">
                <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm font-bold text-slate-600 bg-slate-100 rounded-lg hover:bg-slate-200" th:text="#{matchResults.modal.cancel}">Cancel</button>
                <button type="button" onclick="deleteMatch()" class="px-4 py-2 text-sm font-bold text-white bg-red-600 rounded-lg hover:bg-red-700 shadow-md" th:text="#{matchResults.modal.confirm}">Yes, Delete</button>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    let selectedMatchId = null;

    function confirmDelete(button) {
        selectedMatchId = button.dataset.matchId;
        const homeTeam = button.dataset.homeTeam;
        const awayTeam = button.dataset.awayTeam;
        const template = /*[[#{matchResults.modal.message}]]*/ 'Are you sure you want to delete <strong class="text-slate-900 uppercase">"__HOME__ vs __AWAY__"</strong>?';

        document.getElementById('confirmMessage').innerHTML = template
            .replace('__HOME__', homeTeam)
            .replace('__AWAY__', awayTeam);

        const modal = document.getElementById('confirmModal');
        const content = document.getElementById('modalContent');
        modal.classList.remove('hidden');
        setTimeout(() => {
            content.classList.remove('scale-95');
            content.classList.add('scale-100');
        }, 10);
    }

    function closeModal() {
        const modal = document.getElementById('confirmModal');
        const content = document.getElementById('modalContent');
        content.classList.remove('scale-100');
        content.classList.add('scale-95');
        setTimeout(() => { modal.classList.add('hidden'); }, 150);
    }

    async function deleteMatch() {
        if (!selectedMatchId) {
            return;
        }

        const response = await fetch('/api/matches/' + selectedMatchId, {
            method: 'DELETE'
        });

        if (response.ok) {
            window.location.reload();
            return;
        }

        closeModal();
        alert(await response.text());
    }
</script>

</body>
</html>
