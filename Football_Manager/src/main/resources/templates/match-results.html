<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Football Manager - Match Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pitch-bg {
            background-color: #f8fafc;
            background-image: url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23e2e8f0" fill-opacity="0.4"%3E%3Cpath d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');
        }
    </style>
</head>
<body class="pitch-bg min-h-screen font-sans text-slate-800">

<nav class="bg-slate-900 border-b-2 border-emerald-600 shadow-md">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>
                <span class="text-xl font-black text-white uppercase tracking-wider">Match<span class="text-emerald-500">Results</span></span>
            </div>
            <a href="/admin" class="px-4 py-2 bg-slate-800 text-slate-300 text-sm font-medium rounded-md hover:bg-slate-700 hover:text-white transition-colors border border-slate-700">
                Back to Admin
            </a>
        </div>
    </div>
</nav>

<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight uppercase">Final Scores</h1>
        <p class="text-slate-500 mt-1 font-medium">Review completed matches and their final scorelines.</p>
    </div>

    <div th:if="${#lists.isEmpty(results)}" class="bg-white p-10 rounded-2xl shadow-sm border border-slate-200 text-center">
        <h2 class="text-xl font-bold text-slate-800">No match results available</h2>
        <p class="text-slate-500 mt-2">Finished matches will appear here once scores are registered.</p>
    </div>

    <div th:if="${!#lists.isEmpty(results)}" class="space-y-4">
        <div th:each="result : ${results}" class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div class="flex-1 text-center md:text-left">
                    <p class="text-lg font-bold text-slate-900 uppercase" th:text="${result.homeTeamName}">Home Team</p>
                </div>

                <div class="text-center min-w-44">
                    <p class="text-3xl font-extrabold text-emerald-600" th:text="${result.homeScore + ' - ' + result.awayScore}">0 - 0</p>
                    <p class="text-xs text-slate-500 mt-1" th:text="${#temporals.format(result.kickoffTime, 'dd MMM yyyy HH:mm')}">20 Apr 2026 19:00</p>
                </div>

                <div class="flex-1 text-center md:text-right">
                    <p class="text-lg font-bold text-slate-900 uppercase" th:text="${result.awayTeamName}">Away Team</p>
                </div>
            </div>
                        <div class="mt-4 flex justify-end">
                <a th:href="@{/matches/edit/{id}(id=${result.id})}"
                   class="inline-flex items-center px-4 py-2 text-sm font-medium rounded-md bg-blue-600 text-white hover:bg-blue-700 transition-colors">
                    Edit Match
                </a>
            </div>
        </div>
    </div>
</main>

</body>
</html>
