<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Football Manager - Schedule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pitch-bg {
            background-color: #f8fafc;
            background-image: url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23e2e8f0" fill-opacity="0.4"%3E%3Cpath d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');
        }
    </style>
</head>

<body class="pitch-bg min-h-screen font-sans text-slate-800 pb-10">

<nav class="bg-slate-900 border-b-2 border-emerald-600 shadow-md mb-10">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                    </path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z">
                    </path>
                </svg>
                <span class="text-xl font-black text-white uppercase tracking-wider">
                    Control<span class="text-emerald-500">Center</span>
                </span>
            </div>

            <a href="/admin"
               class="px-4 py-2 bg-slate-800 text-slate-300 text-sm font-medium rounded-md hover:bg-slate-700 hover:text-white transition-colors border border-slate-700">
                Back to Admin
            </a>
        </div>
    </div>
</nav>

<div class="max-w-lg mx-auto bg-white p-8 rounded-lg shadow border border-slate-200">
    <h2 class="text-2xl font-bold mb-6 text-slate-900">Schedule New Match</h2>

    <form th:action="@{/api/matches}" th:object="${matchRequest}" method="POST" class="space-y-4">

        <div>
            <label class="block text-sm font-medium text-slate-700">Home Team</label>
            <select th:field="*{homeTeamId}" class="w-full border p-2 rounded" required>
                <option value="" disabled selected>Select home team</option>
                <option th:each="team : ${teams}" th:value="${team.id}" th:text="${team.name}"></option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Away Team</label>
            <select th:field="*{awayTeamId}" class="w-full border p-2 rounded" required>
                <option value="" disabled selected>Select away team</option>
                <option th:each="team : ${teams}" th:value="${team.id}" th:text="${team.name}"></option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Competition ID</label>
            <input type="number" th:field="*{competitionId}" class="w-full border p-2 rounded" required>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Kickoff Time</label>
            <input type="datetime-local" th:field="*{kickoffTime}" class="w-full border p-2 rounded" required>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Venue</label>
            <input type="text" th:field="*{venue}" class="w-full border p-2 rounded" required>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Status</label>
            <select th:field="*{status}" class="w-full border p-2 rounded">
                <option th:each="st : ${T(com.example.football_manager.dto.MatchRequestDTO.MatchStatus).values()}"
                        th:value="${st}" th:text="${st}">
                </option>
            </select>
        </div>

        <button type="submit"
                class="w-full bg-emerald-600 text-white py-2 rounded hover:bg-emerald-700 font-bold transition-colors">
            Schedule Match
        </button>
    </form>
</div>

</body>
</html>
